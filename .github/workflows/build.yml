name: 📦 Build Deemix with PyInstaller

on:
  push:
    branches:
      - main
    paths:
      - 'deemix/**'
      - 'requirements.txt'
      - 'setup.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: deemix-linux-x86_64
            exe_name: deemix
          - os: windows-latest
            artifact_name: deemix-windows-x86_64
            exe_name: deemix.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip install -e .

      - name: 🔍 Find entry point
        id: entrypoint
        shell: bash
        run: |
          # Ищем __main__.py или cli.py в deemix/
          if [ -f "deemix/__main__.py" ]; then
            echo "entry=deemix/__main__.py" >> $GITHUB_OUTPUT
            echo "Найден: deemix/__main__.py"
          elif [ -f "deemix/cli.py" ]; then
            echo "entry=deemix/cli.py" >> $GITHUB_OUTPUT
            echo "Найден: deemix/cli.py"
          else
            ENTRY=$(find deemix/ -name "*.py" | head -1)
            echo "entry=$ENTRY" >> $GITHUB_OUTPUT
            echo "Используем: $ENTRY"
          fi

      - name: 🔨 Build with PyInstaller
        run: |
          pyinstaller --onefile --name deemix ${{ steps.entrypoint.outputs.entry }}

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: 📥 Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: deemix-linux-x86_64
          path: ./artifacts/linux

      - name: 📥 Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: deemix-windows-x86_64
          path: ./artifacts/windows

      - name: 🔖 Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Deemix build ${{ steps.sha.outputs.short }}"
          body: |
            Автоматическая сборка из коммита `${{ github.sha }}`.

            | Файл | Платформа |
            |---|---|
            | `deemix` | Linux x86_64 |
            | `deemix.exe` | Windows x86_64 |
          files: |
            ./artifacts/linux/deemix
            ./artifacts/windows/deemix.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
